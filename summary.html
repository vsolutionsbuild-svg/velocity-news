<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Summary — Velocity Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Work+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5EW3H2XBGX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-5EW3H2XBGX');
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0f0e0b;
  --bg2:     #161410;
  --surface: #1a1814;
  --accent:  #c8920a;
  --text:    #ede5d0;
  --muted:   #a89270;
  --dim:     #6b5e48;
  --border:  rgba(200,146,10,0.16);
  --border2: rgba(200,146,10,0.08);
  --head:    'Cormorant Garamond', serif;
  --body:    'Work Sans', sans-serif;
  --mono:    'IBM Plex Mono', monospace;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: repeating-linear-gradient(
    -52deg, transparent, transparent 28px,
    rgba(200,146,10,0.028) 28px, rgba(200,146,10,0.028) 29px
  );
  pointer-events: none;
  z-index: 0;
}

/* ── NAV ── */
.topnav {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: rgba(15,14,11,0.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
.topnav-row1 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 48px;
  border-bottom: 1px solid rgba(200,146,10,0.08);
}
.topnav-logo {
  font-family: var(--head);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-decoration: none;
  text-shadow: 0 0 30px rgba(200,146,10,0.3);
}
.topnav-right-inner {
  display: flex;
  align-items: center;
  gap: 16px;
}
.topnav-contact {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.topnav-contact:hover { color: var(--accent); }
.hamburger {
  display: flex;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
  background: none;
  border: none;
}
.hamburger span {
  display: block;
  width: 22px; height: 1.5px;
  background: var(--accent);
}
.topnav-row2 {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  height: 40px;
}
.topnav-link {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--body);
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  letter-spacing: 0.04em;
  border-right: 1px solid rgba(200,146,10,0.08);
  transition: all 0.2s;
  cursor: pointer;
  background: none;
  border-top: none;
  border-bottom: none;
  border-left: none;
}
.topnav-link:last-child { border-right: none; }
.topnav-link:hover { color: var(--text); background: rgba(200,146,10,0.04); }
.topnav-link.active { color: var(--accent); background: rgba(200,146,10,0.06); box-shadow: inset 0 -2px 0 var(--accent); }

/* ── LAYOUT ── */
.layout {
  margin-top: 88px;
  min-height: calc(100vh - 88px);
  position: relative;
  z-index: 1;
  max-width: 860px;
  margin-left: auto;
  margin-right: auto;
  padding: 56px 48px 80px;
}

/* ── HEADER ── */
.page-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
  opacity: 0.7;
}

.page-title {
  font-family: var(--head);
  font-size: clamp(36px, 5vw, 60px);
  font-weight: 400;
  line-height: 1.05;
  color: var(--text);
  margin-bottom: 12px;
}

.page-sub {
  font-size: 15px;
  line-height: 1.7;
  color: var(--muted);
  max-width: 560px;
  margin-bottom: 8px;
}

.updated-line {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--dim);
  margin-bottom: 48px;
}

.title-rule {
  height: 1px;
  background: linear-gradient(90deg, var(--accent), transparent);
  margin-bottom: 48px;
  opacity: 0.3;
}

/* ── THEME SECTIONS ── */
.themes { display: flex; flex-direction: column; gap: 0; }

.theme-section {
  padding: 36px 0;
  border-bottom: 1px solid var(--border2);
}
.theme-section:last-child { border-bottom: none; }

.theme-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
  opacity: 0.7;
}

.theme-title {
  font-family: var(--head);
  font-size: 26px;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 16px;
  line-height: 1.15;
}

.theme-body {
  font-size: 15px;
  line-height: 1.82;
  color: var(--muted);
}
.theme-body p { margin-bottom: 16px; }
.theme-body p:last-child { margin-bottom: 0; }
.theme-body strong { color: var(--text); font-weight: 500; }

/* ── SOURCES ── */
.sources-section {
  margin-top: 56px;
  padding-top: 40px;
  border-top: 1px solid var(--border);
}

.sources-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 20px;
}

.sources-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.sources-list li {
  font-size: 13px;
  color: var(--dim);
  padding-left: 16px;
  border-left: 1px solid var(--border);
  line-height: 1.5;
}

/* ── LOADING / EMPTY ── */
.loading-state {
  text-align: center;
  padding: 80px 20px;
}
.loading-state p {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
  margin-top: 16px;
}

.empty-state {
  text-align: center;
  padding: 80px 20px;
}
.empty-state h2 {
  font-family: var(--head);
  font-size: 28px;
  font-weight: 400;
  color: var(--muted);
  margin-bottom: 16px;
  font-style: italic;
}
.empty-state p {
  font-size: 14px;
  color: var(--dim);
  line-height: 1.7;
}

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* ── FOOTER ── */
.doc-footer {
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--dim);
  flex-wrap: wrap;
  gap: 8px;
}

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--accent);
  padding: 40px 44px;
  max-width: 420px;
  width: 90%;
}
.modal-eyebrow { font-family: var(--mono); font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); opacity: 0.7; margin-bottom: 12px; }
.modal-title { font-family: var(--head); font-size: 32px; font-weight: 400; color: var(--text); margin-bottom: 16px; }
.modal-body { font-size: 14px; line-height: 1.75; color: var(--muted); margin-bottom: 28px; }
.modal-close { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); background: transparent; border: 1px solid var(--border); padding: 8px 20px; cursor: pointer; transition: all 0.2s; }
.modal-close:hover { border-color: var(--accent); }

@media (max-width: 720px) {
  .topnav-link { font-size: 10px; letter-spacing: 0; padding: 0 2px; }
 .topnav-contact { display: block !important; font-size: 8px; letter-spacing: 0.05em; } 
  .layout { padding: 32px 20px 64px; margin-top: 88px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <div class="topnav-row1">
    <a href="/" class="topnav-logo">Velocity Solutions</a>
    <div class="topnav-right-inner">
      <a href="mailto:contact@velocitysolutions.build" class="topnav-contact">contact@velocitysolutions.build</a>
      <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <div class="topnav-row2">
    <a href="index.html" class="topnav-link">Analysis</a>
    <a href="news.html" class="topnav-link">Daily News</a>
    <a href="summary.html" class="topnav-link active">Live Summary</a>
    <a href="#" class="topnav-link" onclick="showComingSoon('Services'); return false;">Services</a>
    <a href="mailto:contact@velocitysolutions.build" class="topnav-link">Contact</a>
  </div>
</nav>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-eyebrow">Coming Soon</div>
    <div class="modal-title" id="modalTitle"></div>
    <p class="modal-body" id="modalBody"></p>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<div class="layout">

  <div id="content">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading summary...</p>
    </div>
  </div>

</div>

<script>
const SUMMARY_URL = '/summary.json';

document.addEventListener('DOMContentLoaded', async () => {
  await loadSummary();
});

async function loadSummary() {
  try {
    const res = await fetch(SUMMARY_URL + '?cb=' + Date.now());
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();
    renderSummary(data);
  } catch (err) {
    renderEmpty();
  }
}

function renderSummary(data) {
  const themes = data.themes || [];
  const sources = data.sources || [];
  const updated = data.updated || '';

  document.getElementById('content').innerHTML = `
    <div class="page-eyebrow">AI in Construction · Running Resource</div>
    <h1 class="page-title">What AI Is Actually Doing in Construction</h1>
    <p class="page-sub">A continuously updated synthesis of every development this site has covered — organized by theme, not by date.</p>
    <div class="updated-line">Last updated: ${updated} · Updated every Monday at 4:00 AM</div>
    <div class="title-rule"></div>

    <div class="themes">
      ${themes.map((t, i) => `
        <div class="theme-section">
          <div class="theme-label">Theme ${String(i + 1).padStart(2, '0')}</div>
          <h2 class="theme-title">${t.title}</h2>
          <div class="theme-body">
            ${t.body.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('')}
          </div>
        </div>
      `).join('')}
    </div>

    ${sources.length > 0 ? `
    <div class="sources-section">
      <div class="sources-label">Articles Covered</div>
      <ul class="sources-list">
        ${sources.map(s => `<li>${s}</li>`).join('')}
      </ul>
    </div>
    ` : ''}

    <div class="doc-footer">
      <span>© 2025 Velocity Solutions LLC</span>
      <span>velocitysolutions.build</span>
    </div>
  `;
}

function renderEmpty() {
  document.getElementById('content').innerHTML = `
    <div class="page-eyebrow">AI in Construction · Running Resource</div>
    <h1 class="page-title">What AI Is Actually Doing in Construction</h1>
    <div class="title-rule"></div>
    <div class="empty-state">
      <h2>First summary coming Monday.</h2>
      <p>This page synthesizes everything the Daily News has covered into one running resource, organized by theme. It updates automatically every Monday at 4:00 AM.</p>
      <p style="margin-top: 16px;">In the meantime, read the <a href="news.html" style="color: var(--accent);">Daily News</a>.</p>
    </div>
    <div class="doc-footer">
      <span>© 2025 Velocity Solutions LLC</span>
      <span>velocitysolutions.build</span>
    </div>
  `;
}

// Modal
function showComingSoon(page) {
  document.getElementById('modalTitle').textContent = page;
  document.getElementById('modalBody').textContent = 'When the time is right, this is where the offer lives. Stay tuned.';
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>

</body>
</html>
