<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0f0e0b;
  --bg2:     #161410;
  --surface: #1a1814;
  --accent:  #c8920a;
  --text:    #ede5d0;
  --muted:   #a89270;
  --dim:     #6b5e48;
  --border:  rgba(200,146,10,0.16);
  --border2: rgba(200,146,10,0.08);
  --head:    'Cormorant Garamond', serif;
  --body:    'Work Sans', sans-serif;
  --mono:    'IBM Plex Mono', monospace;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: repeating-linear-gradient(
    -52deg, transparent, transparent 28px,
    rgba(200,146,10,0.028) 28px, rgba(200,146,10,0.028) 29px

  pointer-events: none;
  z-index: 0;
}

/* ── NAV ── */

  background: rgba(15,14,11,0.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);

}
.topnav-row1 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 48px;

}
.topnav-logo {
  font-family: var(--head);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-decoration: none;
  text-shadow: 0 0 30px rgba(200,146,10,0.3);
}
.topnav-right-inner {
  display: flex;
  align-items: center;
  gap: 16px;
}
.topnav-contact {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.topnav-contact:hover { color: var(--accent); }
.hamburger {
  display: flex;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
  background: none;
  border: none;
}
.hamburger span {
  display: block;
  width: 22px; height: 1.5px;
  background: var(--accent);
}
.topnav-row2 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  height: 40px;
}
.topnav-link {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--body);
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  letter-spacing: 0.04em;
  border-right: 1px solid rgba(200,146,10,0.08);
  transition: all 0.2s;
  cursor: pointer;
  background: none;
  border-top: none;
  border-bottom: none;
  border-left: none;
}
.topnav-link:last-child { border-right: none; }
.topnav-link:hover { color: var(--text); background: rgba(200,146,10,0.04); }
.topnav-link.active { color: var(--accent); background: rgba(200,146,10,0.06); box-shadow: inset 0 -2px 0 var(--accent); }

/* ── LAYOUT ── */
.layout {
  display: flex;
  margin-top: 88px;
  min-height: calc(100vh - 88px);
  position: relative;
  z-index: 1;
}

/* ── SIDEBAR (archive) ── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  position: fixed;
  top: 88px; bottom: 0; left: 0;
  overflow-y: auto;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 28px 0 48px;
  z-index: 50;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); }

.sidebar-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--dim);
  padding: 0 20px;
  margin-bottom: 16px;
}

.archive-list { list-style: none; }
.archive-item a {
  display: block;
  padding: 10px 20px;
  font-size: 13px;

  border-left: 2px solid transparent;

}
.archive-item a:hover { color: var(--text); border-left-color: var(--accent2); background: rgba(200,146,10,0.04); }
.archive-item.active a { color: var(--accent); border-left-color: var(--accent); background: rgba(200,146,10,0.06); }
.archive-date {
  font-family: var(--mono);

}

.sidebar-overlay {

}

/* ── MAIN ── */
.main {

  flex: 1;
  max-width: 780px;

  z-index: 1;
}

/* ── ARTICLE HEADER ── */
.article-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;

  margin-bottom: 16px;

}

.article-title {

  font-size: clamp(28px, 4vw, 48px);
  font-weight: 400;

  color: var(--text);

}

.article-meta {

  align-items: center;
  gap: 16px;

}
.article-date {

}
.article-author {

/* ── AUDIO PLAYER ── */
.audio-player {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 20px 24px;
  margin-bottom: 40px;
}

.player-top {

  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}

.play-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, color 0.2s;
  position: relative;
  overflow: hidden;
}
.play-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--accent);
  transform: scale(0);
  border-radius: 50%;
  transition: transform 0.2s;
}
.play-btn:hover::before { transform: scale(1); }
.play-btn:hover { color: var(--bg); }
.play-btn .icon { position: relative; z-index: 1; }

.player-info { flex: 1; }
.player-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}
.player-status {
  font-size: 13px;
  color: var(--text);
}

.progress-wrap {
  width: 100%;
  height: 3px;
  background: rgba(200,146,10,0.12);
  cursor: pointer;
  margin-bottom: 14px;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.3s linear;
  pointer-events: none;
}

.player-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.speed-btn {
  padding: 4px 12px;
  border: 1px solid var(--border);

  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;

}
.speed-btn:hover, .speed-btn.active { color: var(--accent); border-color: var(--accent); }

.loading-spinner {

  border-top-color: var(--accent);

}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ARTICLE BODY ── */
.article-rule {

}

.article-pull {

/* ── COMMENTS ── */

@media (max-width: 720px) {

.modal-title { font-family: var(--head); font-size: 32px; font-weight: 400; color: var(--text); margin-bottom: 16px; }
.modal-body { font-size: 14px; line-height: 1.75; color: var(--muted); margin-bottom: 28px; }

.modal-close:hover { border-color: var(--accent); }
</style>

<script>
// ── CONFIG ──
const TTS_API_KEY = 'AIzaSyDyI6sBf5CfVzgK6ydMooBclmI2n1Zag4w';
const TTS_VOICE = 'en-US-Chirp3-HD-Charon';
const TTS_ENDPOINT = `https://texttospeech.googleapis.com/v1/text:synthesize?key=${TTS_API_KEY}`;
const GITHUB_RAW = '/articles.json';

// ── FALLBACK ARTICLES (shown when Sheet is empty) ──
const fallbackArticles = [
  {
    id: 'may-10-2026',
    date: 'May 10, 2026',
    title: 'AI Workflow Automation Reaches the Specialty Contractor',
    readTime: '4 min read',
    mp3_url: '',
    body: 'For years, the conversation around construction technology has centered on large general contractors and enterprise software platforms. That is beginning to change.\n\nThe numbers driving this shift are not complicated. Construction labor productivity has declined roughly 30% since 1970, even as economy-wide productivity has more than doubled.\n\nWhat has changed in 2025 and 2026 is the accessibility of the tools. AI systems capable of reading field tickets and generating priced billing packages are no longer experimental. They are deployable today.\n\nThe question for specialty contractors in 2026 is no longer whether this technology works. It is whether they move before their competitors do.'
  }
];

let articles = [];

// ── STATE ──
let currentArticle = null;
let audioContext = null;
let audioSource = null;
let audioBuffer = null;
let isPlaying = false;
let isPaused = false;
let pauseOffset = 0;
let startTime = 0;
let playbackRate = 1.0;
let progressTimer = null;

// ── INIT ──
document.addEventListener('DOMContentLoaded', async () => {
  await fetchArticlesFromSheet();
  buildArchive();
  if (articles.length > 0) loadArticle(articles[0].id);
});

async function fetchArticlesFromSheet() {
  try {
    const res = await fetch(GITHUB_RAW + '?cb=' + Date.now());
    if (!res.ok) throw new Error('Fetch failed: ' + res.status);
    const data = await res.json();
    if (data && data.length > 0) {
      articles = data;
      return;
    }
    articles = fallbackArticles;
  } catch (err) {
    console.warn('Articles fetch failed, using fallback:', err);
    articles = fallbackArticles;
  }
}

function buildArchive() {
  const list = document.getElementById('archiveList');
  list.innerHTML = articles.map(a => `
    <li class="archive-item" id="archive-${a.id}">
      <a href="#" onclick="loadArticle('${a.id}'); return false;">
        ${a.title}
        <span class="archive-date">${a.date}</span>
      </a>
    </li>
  `).join('');
}

function loadArticle(id) {
  const article = articles.find(a => a.id === id);
  if (!article) return;

  currentArticle = article;
  stopAudio();

  // Update archive highlight
  document.querySelectorAll('.archive-item').forEach(el => el.classList.remove('active'));
  const archiveItem = document.getElementById('archive-' + id);
  if (archiveItem) archiveItem.classList.add('active');

  // Render article
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="article-eyebrow">Daily News · AI in Construction</div>
    <h1 class="article-title">${article.title}</h1>
    <div class="article-meta">
      <span class="article-date">${article.date}</span>
      <span class="article-author">Written by Claude · Anthropic</span>
      <span class="read-time">${article.readTime}</span>
    </div>

    <!-- AUDIO PLAYER -->
    <div class="audio-player" id="audioPlayer">
      <div class="player-top">
        <button class="play-btn" id="playBtn" onclick="toggleAudio()">
          <span class="icon" id="playIcon">▶</span>
        </button>
        <div class="player-info">
          <div class="player-label">Listen to this article</div>
          <div class="player-status" id="playerStatus">Press play to listen</div>
        </div>
        <div class="loading-spinner" id="loadingSpinner"></div>
      </div>
      <div class="progress-wrap" id="progressWrap" onclick="seekAudio(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="player-controls">
        <span style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.1em;">SPEED</span>
        <button class="speed-btn" onclick="setRate(0.8)">0.8×</button>
        <button class="speed-btn active" id="rate-1" onclick="setRate(1.0)">1.0×</button>
        <button class="speed-btn" onclick="setRate(1.25)">1.25×</button>
        <button class="speed-btn" onclick="setRate(1.5)">1.5×</button>
      </div>
    </div>
    <div id="mp3Url" style="display:none;" data-url="${article.mp3_url || ''}"></div>

    <div class="article-rule"></div>

    <div class="article-body" id="articleBody">
      ${article.body.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('')}
    </div>

    <!-- COMMENTS -->
    <div class="comments-section">
      <div class="comments-label">Discussion</div>
      <div id="disqus_thread"></div>
    </div>
  `;

  // Load Disqus
  loadDisqus(article.id, article.title);

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');

  // Scroll to top
  window.scrollTo(0, 0);
}

// ── GOOGLE TTS ──
async function fetchAudio(text) {
  const status = document.getElementById('playerStatus');
  const spinner = document.getElementById('loadingSpinner');
  const playIcon = document.getElementById('playIcon');

  status.textContent = 'Preparing audio...';
  spinner.style.display = 'block';
  playIcon.textContent = '...';

  try {
    const response = await fetch(TTS_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        input: { text },
        voice: {
          languageCode: 'en-US',
          name: TTS_VOICE
        },
        audioConfig: {
          audioEncoding: 'MP3',
          speakingRate: playbackRate,
          pitch: 0
        }
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'TTS request failed');
    }

    const data = await response.json();
    const audioData = atob(data.audioContent);
    const bytes = new Uint8Array(audioData.length);
    for (let i = 0; i < audioData.length; i++) bytes[i] = audioData.charCodeAt(i);

    if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    audioBuffer = await audioContext.decodeAudioData(bytes.buffer);

    spinner.style.display = 'none';
    return true;
  } catch (err) {
    console.error('TTS error:', err);
    spinner.style.display = 'none';
    status.textContent = 'Audio unavailable — ' + err.message;
    playIcon.textContent = '▶';
    return false;
  }
}

function playAudioBuffer(offset = 0) {
  if (!audioBuffer || !audioContext) return;

  if (audioSource) {
    audioSource.disconnect();
    audioSource = null;
  }

  audioSource = audioContext.createBufferSource();
  audioSource.buffer = audioBuffer;
  audioSource.playbackRate.value = playbackRate;
  audioSource.connect(audioContext.destination);
  audioSource.start(0, offset);
  startTime = audioContext.currentTime - offset;
  isPlaying = true;
  isPaused = false;

  document.getElementById('playIcon').textContent = '⏸';
  document.getElementById('playerStatus').textContent = 'Playing...';

  audioSource.onended = () => {
    if (isPlaying) {
      isPlaying = false;
      document.getElementById('playIcon').textContent = '▶';
      document.getElementById('playerStatus').textContent = 'Finished';
      document.getElementById('progressFill').style.width = '100%';
      clearInterval(progressTimer);
    }
  };

  startProgressTimer();
}

function startProgressTimer() {
  clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    if (!isPlaying || !audioBuffer) return;
    const elapsed = audioContext.currentTime - startTime;
    const pct = Math.min((elapsed / audioBuffer.duration) * 100, 100);
    document.getElementById('progressFill').style.width = pct + '%';
    const remaining = audioBuffer.duration - elapsed;
    const mins = Math.floor(remaining / 60);
    const secs = Math.floor(remaining % 60);
    document.getElementById('playerStatus').textContent =
      mins > 0 ? `${mins}m ${secs}s remaining` : `${secs}s remaining`;
  }, 500);
}

async function toggleAudio() {
  if (audioContext && audioContext.state === 'suspended') await audioContext.resume();

  if (!audioBuffer) {
    // Check for pre-generated MP3 first
    const mp3El = document.getElementById('mp3Url');
    const mp3Url = mp3El ? mp3El.dataset.url : '';

    if (mp3Url) {
      // Stream pre-generated MP3
      document.getElementById('playerStatus').textContent = 'Loading audio...';
      document.getElementById('loadingSpinner').style.display = 'block';
      try {
        const res = await fetch(mp3Url);
        const arrayBuffer = await res.arrayBuffer();
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        document.getElementById('loadingSpinner').style.display = 'none';
        playAudioBuffer(0);
      } catch(e) {
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('playerStatus').textContent = 'Audio unavailable';
      }
    } else {
      // Generate on-demand via TTS API
      const text = document.getElementById('articleBody')?.innerText || '';
      const success = await fetchAudio(text);
      if (!success) return;
      playAudioBuffer(0);
    }
  } else if (isPlaying) {
    pauseOffset = audioContext.currentTime - startTime;
    audioSource.stop();
    audioSource = null;
    isPlaying = false;
    isPaused = true;
    clearInterval(progressTimer);
    document.getElementById('playIcon').textContent = '▶';
    document.getElementById('playerStatus').textContent = 'Paused';
  } else if (isPaused) {
    playAudioBuffer(pauseOffset);
  } else {
    playAudioBuffer(0);
  }
}

function stopAudio() {
  if (audioSource) { try { audioSource.stop(); } catch(e) {} audioSource = null; }
  isPlaying = false; isPaused = false; pauseOffset = 0;
  audioBuffer = null;
  clearInterval(progressTimer);
}

async function seekAudio(e) {
  if (!audioBuffer) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const offset = pct * audioBuffer.duration;
  if (isPlaying || isPaused) {
    if (audioSource) { try { audioSource.stop(); } catch(e) {} }
    isPlaying = false; isPaused = false;
    playAudioBuffer(offset);
  }
}

async function setRate(r) {
  playbackRate = r;
  document.querySelectorAll('.speed-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === r + '×' || b.textContent === r.toFixed(1) + '×');
  });
  if (isPlaying) {
    const currentOffset = audioContext.currentTime - startTime;
    if (audioSource) { try { audioSource.stop(); } catch(e) {} }
    isPlaying = false;
    // Re-fetch with new speed
    audioBuffer = null;
    const text = document.getElementById('articleBody')?.innerText || '';
    const success = await fetchAudio(text);
    if (success) playAudioBuffer(currentOffset);
  }
}

// ── DISQUS ──
function loadDisqus(articleId, articleTitle) {
  if (window.DISQUS) {
    DISQUS.reset({ reload: true, config: function() {
      this.page.identifier = articleId;
      this.page.title = articleTitle;
    }});
    return;
  }
  window.disqus_config = function() {
    this.page.url = `https://velocitysolutions.build/news.html#${articleId}`;
    this.page.identifier = articleId;
    this.page.title = articleTitle;
  };
  const d = document, s = d.createElement('script');
  // Replace 'velocitysolutions' with your Disqus shortname once registered
  s.src = 'https://velocitysolutions.disqus.com/embed.js';
  s.setAttribute('data-timestamp', +new Date());
  (d.head || d.body).appendChild(s);
}

// ── SIDEBAR ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('active');
}

// ── MODALS ──
const modalDesc = {
  'Live Summary': 'A continuously updated synthesis of everything this site has covered — the definitive running resource on AI in construction.',
  'Services': 'When the time is right, this is where the offer lives. Stay tuned.'
};
function showComingSoon(page) {
  document.getElementById('modalTitle').textContent = page;
  document.getElementById('modalBody').textContent = modalDesc[page] || '';
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
