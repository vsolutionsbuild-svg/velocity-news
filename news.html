<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News — Velocity Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Work+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0f0e0b;
  --bg2:     #161410;
  --surface: #1a1814;
  --accent:  #c8920a;
  --text:    #ede5d0;
  --muted:   #a89270;
  --dim:     #6b5e48;
  --border:  rgba(200,146,10,0.16);
  --border2: rgba(200,146,10,0.08);
  --head:    'Cormorant Garamond', serif;
  --body:    'Work Sans', sans-serif;
  --mono:    'IBM Plex Mono', monospace;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: repeating-linear-gradient(
    -52deg, transparent, transparent 28px,
    rgba(200,146,10,0.028) 28px, rgba(200,146,10,0.028) 29px
  );
  pointer-events: none;
  z-index: 0;
}

/* ── NAV ── */
.topnav {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: rgba(15,14,11,0.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  z-index: 200;
}
.topnav-row1 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 48px;
  border-bottom: 1px solid rgba(200,146,10,0.08);
}
.topnav-logo {
  font-family: var(--head);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-decoration: none;
  text-shadow: 0 0 30px rgba(200,146,10,0.3);
}
.topnav-right-inner { display: flex; align-items: center; gap: 16px; }
.topnav-contact {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.topnav-contact:hover { color: var(--accent); }
.hamburger {
  display: flex;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
  background: none;
  border: none;
}
.hamburger span { display: block; width: 22px; height: 1.5px; background: var(--accent); }
.topnav-row2 {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  height: 40px;
}
.topnav-link {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--body);
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  letter-spacing: 0.04em;
  border-right: 1px solid rgba(200,146,10,0.08);
  transition: all 0.2s;
  cursor: pointer;
  background: none;
  border-top: none;
  border-bottom: none;
  border-left: none;
  padding: 0 4px;
  text-align: center;
}
.topnav-link:last-child { border-right: none; }
.topnav-link:hover { color: var(--text); background: rgba(200,146,10,0.04); }
.topnav-link.active { color: var(--accent); background: rgba(200,146,10,0.06); box-shadow: inset 0 -2px 0 var(--accent); }

/* ── LAYOUT ── */
.layout {
  display: flex;
  margin-top: 88px;
  min-height: calc(100vh - 88px);
  position: relative;
  z-index: 1;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  position: fixed;
  top: 88px; bottom: 0; left: 0;
  overflow-y: auto;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 0;
  z-index: 50;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); }

/* ── INTERNAL TABS ── */
.tab-nav {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg2);
  z-index: 10;
}
.tab-btn {
  padding: 14px 8px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--dim);
  background: none;
  border: none;
  border-right: 1px solid var(--border2);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.tab-btn:last-child { border-right: none; }
.tab-btn:hover { color: var(--muted); background: rgba(200,146,10,0.03); }
.tab-btn.active { color: var(--accent); background: rgba(200,146,10,0.06); box-shadow: inset 0 -2px 0 var(--accent); }

.sidebar-content { padding: 20px 0 48px; }

.sidebar-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 20px;
  margin-bottom: 12px;
}

.archive-list { list-style: none; }
.archive-item a {
  display: block;
  padding: 10px 20px;
  font-size: 13px;
  color: var(--text);
  text-decoration: none;
  border-left: 2px solid transparent;
  transition: all 0.15s;
  line-height: 1.4;
}
.archive-item a:hover { color: var(--accent); border-left-color: var(--accent); background: rgba(200,146,10,0.04); }
.archive-item.active a { color: var(--accent); border-left-color: var(--accent); background: rgba(200,146,10,0.06); }
.archive-date {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--dim);
  display: block;
  margin-top: 3px;
}

/* Summary nav */
.summary-nav { list-style: none; }
.summary-nav li a {
  display: block;
  padding: 10px 20px;
  font-size: 13px;
  color: var(--text);
  text-decoration: none;
  border-left: 2px solid transparent;
  transition: all 0.15s;
  line-height: 1.4;
}
.summary-nav li a:hover { color: var(--accent); border-left-color: var(--accent); background: rgba(200,146,10,0.04); }
.summary-nav li a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(200,146,10,0.06); }

/* Download button */
.download-wrap {
  padding: 16px 20px;
  border-top: 1px solid var(--border2);
  margin-top: 16px;
}
.download-btn {
  width: 100%;
  padding: 10px 16px;
  background: rgba(200,146,10,0.08);
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  display: block;
}
.download-btn:hover { background: rgba(200,146,10,0.14); border-color: var(--accent); }
.download-tip {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.08em;
  color: var(--dim);
  margin-top: 8px;
  line-height: 1.5;
  text-align: center;
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 88px 0 0 0;
  background: rgba(0,0,0,0.6);
  z-index: 49;
}
.sidebar-overlay.active { display: block; }

/* ── MAIN ── */
.main {
  margin-left: 260px;
  flex: 1;
  max-width: 780px;
  padding: 48px 56px 80px;
  position: relative;
  z-index: 1;
}

/* ── ARTICLE STYLES ── */
.article-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
  opacity: 0.7;
}
.article-title {
  font-family: var(--head);
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 400;
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 20px;
}
.article-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.article-date, .article-author, .read-time {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--dim);
}

/* ── AUDIO PLAYER ── */
.audio-player {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 20px 24px;
  margin-bottom: 40px;
}
.player-top {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}
.play-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, color 0.2s;
  position: relative;
  overflow: hidden;
}
.play-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--accent);
  transform: scale(0);
  border-radius: 50%;
  transition: transform 0.2s;
}
.play-btn:hover::before { transform: scale(1); }
.play-btn:hover { color: var(--bg); }
.play-btn .icon { position: relative; z-index: 1; }
.player-info { flex: 1; }
.player-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}
.player-status { font-size: 13px; color: var(--text); }
.loading-spinner {
  display: none;
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.progress-wrap {
  width: 100%;
  height: 3px;
  background: rgba(200,146,10,0.12);
  cursor: pointer;
  margin-bottom: 14px;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.3s linear;
  pointer-events: none;
}
.player-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.speed-btn {
  padding: 4px 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.speed-btn:hover, .speed-btn.active { color: var(--accent); border-color: var(--accent); }

/* ── ARTICLE BODY ── */
.article-rule {
  height: 1px;
  background: linear-gradient(90deg, var(--accent), transparent);
  margin-bottom: 36px;
  opacity: 0.3;
}
.article-body p {
  font-size: 16px;
  line-height: 1.82;
  color: var(--muted);
  margin-bottom: 22px;
}
.article-body p:first-child { font-size: 17px; color: var(--text); }
.article-body strong { color: var(--text); font-weight: 500; }
.article-body h3 {
  font-family: var(--head);
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  margin: 36px 0 14px;
}

/* ── COMMENTS ── */
.comments-section {
  margin-top: 56px;
  padding-top: 40px;
  border-top: 1px solid var(--border);
}
.comments-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 24px;
}

/* ── INSIGHTS STYLES ── */
.insights-header {
  margin-bottom: 40px;
}
.insights-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
  opacity: 0.7;
}
.insights-title {
  font-family: var(--head);
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 400;
  color: var(--text);
  margin-bottom: 12px;
}
.insights-updated {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--dim);
  margin-bottom: 32px;
}
.insights-rule {
  height: 1px;
  background: linear-gradient(90deg, var(--accent), transparent);
  margin-bottom: 40px;
  opacity: 0.3;
}

.category-section {
  margin-bottom: 48px;
}
.category-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
  opacity: 0.7;
}
.category-title {
  font-family: var(--head);
  font-size: 26px;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.tool-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 20px 24px;
  margin-bottom: 16px;
}
.tool-name {
  font-family: var(--head);
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.tool-company {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
  opacity: 0.7;
}
.tool-desc {
  font-size: 14px;
  line-height: 1.75;
  color: var(--muted);
  margin-bottom: 12px;
}
.tool-meta {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border2);
}
.tool-meta-item {
  font-size: 12px;
  color: var(--dim);
}
.tool-meta-item strong {
  display: block;
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2px;
}

.market-context {
  background: rgba(200,146,10,0.04);
  border-left: 3px solid var(--accent);
  padding: 24px 28px;
  margin-top: 40px;
}
.market-context-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
  opacity: 0.7;
}
.market-context-item {
  margin-bottom: 20px;
}
.market-context-item:last-child { margin-bottom: 0; }
.market-context-item h4 {
  font-family: var(--head);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.market-context-item p {
  font-size: 14px;
  line-height: 1.75;
  color: var(--muted);
}

/* ── SUMMARY STYLES ── */
.summary-header {
  margin-bottom: 40px;
}
.question-section {
  margin-bottom: 48px;
  scroll-margin-top: 88px;
}
.question-num {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0.6;
  margin-bottom: 8px;
}
.question-title {
  font-family: var(--head);
  font-size: 24px;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  line-height: 1.2;
}
.question-answer {
  font-size: 15px;
  line-height: 1.82;
  color: var(--muted);
}
.question-answer p { margin-bottom: 16px; }
.question-answer p:last-child { margin-bottom: 0; }
.question-answer strong { color: var(--text); font-weight: 500; }

/* ── LOADING / EMPTY ── */
.loading-state {
  text-align: center;
  padding: 80px 20px;
}
.loading-state p {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
  margin-top: 16px;
}
.empty-state {
  text-align: center;
  padding: 60px 20px;
}
.empty-state h2 {
  font-family: var(--head);
  font-size: 24px;
  font-weight: 400;
  color: var(--muted);
  margin-bottom: 12px;
  font-style: italic;
}
.empty-state p { font-size: 14px; color: var(--dim); line-height: 1.7; }

/* ── FOOTER ── */
.doc-footer {
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--dim);
  flex-wrap: wrap;
  gap: 8px;
}

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--accent);
  padding: 40px 44px;
  max-width: 420px;
  width: 90%;
}
.modal-eyebrow { font-family: var(--mono); font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); opacity: 0.7; margin-bottom: 12px; }
.modal-title { font-family: var(--head); font-size: 32px; font-weight: 400; color: var(--text); margin-bottom: 16px; }
.modal-body { font-size: 14px; line-height: 1.75; color: var(--muted); margin-bottom: 28px; }
.modal-close { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); background: transparent; border: 1px solid var(--border); padding: 8px 20px; cursor: pointer; transition: all 0.2s; }
.modal-close:hover { border-color: var(--accent); }

/* ── MOBILE ── */
@media (max-width: 720px) {
  .topnav-link { font-size: 9px; letter-spacing: 0; padding: 0 1px; }
  .topnav-contact { display: block !important; font-size: 8px; letter-spacing: 0.05em; padding: 8px 4px; }
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.5); }
  .main { margin-left: 0; padding: 28px 20px 64px; }
  .tool-meta { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <div class="topnav-row1">
    <a href="/" class="topnav-logo">Velocity Solutions</a>
    <div class="topnav-right-inner">
      <a href="mailto:contact@velocitysolutions.build" class="topnav-contact">contact@velocitysolutions.build</a>
      <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <div class="topnav-row2">
    <a href="index.html" class="topnav-link">Analysis</a>
    <a href="news.html" class="topnav-link active">News</a>
    <a href="market.html" class="topnav-link">Market Data</a>
    <a href="#" class="topnav-link" onclick="showComingSoon('Services'); return false;">Services</a>
    <a href="mailto:contact@velocitysolutions.build" class="topnav-link">Contact</a>
  </div>
</nav>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="tab-nav">
      <button class="tab-btn active" id="tab-daily" onclick="switchTab('daily')">Daily</button>
      <button class="tab-btn" id="tab-insights" onclick="switchTab('insights')">Insights</button>
      <button class="tab-btn" id="tab-summary" onclick="switchTab('summary')">Summary</button>
    </div>

    <div class="sidebar-content">
      <!-- Daily sidebar -->
      <div id="sidebar-daily">
        <div class="sidebar-label">Archive</div>
        <ul class="archive-list" id="archiveList"></ul>
      </div>

      <!-- Insights sidebar -->
      <div id="sidebar-insights" style="display:none;">
        <div class="sidebar-label">Categories</div>
        <ul class="archive-list" id="insightsCatList"></ul>
      </div>

      <!-- Summary sidebar -->
      <div id="sidebar-summary" style="display:none;">
        <div class="sidebar-label">Questions</div>
        <ul class="summary-nav" id="summaryNavList"></ul>
      </div>

      <!-- Download button -->
      <div class="download-wrap">
        <button class="download-btn" onclick="downloadArchive()">
          Download Archive & Open NotebookLM
        </button>
        <div class="download-tip">Download both files, then drag them into NotebookLM</div>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="mainContent">
    <div class="loading-state">
      <p>Loading...</p>
    </div>
  </main>

// ── AUDIO ──
function playAudioBuffer(offset = 0) {
  if (!audioBuffer || !audioContext) return;
  if (audioSource) { audioSource.disconnect(); audioSource = null; }
  audioSource = audioContext.createBufferSource();
  audioSource.buffer = audioBuffer;
  audioSource.playbackRate.value = playbackRate;
  audioSource.connect(audioContext.destination);
  audioSource.start(0, offset);
  startTime = audioContext.currentTime - offset;
  isPlaying = true; isPaused = false;
  document.getElementById('playIcon').textContent = '⏸';
  document.getElementById('playerStatus').textContent = 'Playing...';
  audioSource.onended = () => {
    if (isPlaying) {
      isPlaying = false;
      document.getElementById('playIcon').textContent = '▶';
      document.getElementById('playerStatus').textContent = 'Finished';
      document.getElementById('progressFill').style.width = '100%';
      clearInterval(progressTimer);
    }
  };
  startProgressTimer();
}

function startProgressTimer() {
  clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    if (!isPlaying || !audioBuffer) return;
    const elapsed = audioContext.currentTime - startTime;
    const pct = Math.min((elapsed / audioBuffer.duration) * 100, 100);
    document.getElementById('progressFill').style.width = pct + '%';
    const remaining = audioBuffer.duration - elapsed;
    const mins = Math.floor(remaining / 60);
    const secs = Math.floor(remaining % 60);
    document.getElementById('playerStatus').textContent =
      mins > 0 ? `${mins}m ${secs}s remaining` : `${secs}s remaining`;
  }, 500);
}

async function toggleAudio() {
  if (audioContext && audioContext.state === 'suspended') await audioContext.resume();
  if (!audioBuffer) {
    const mp3El = document.getElementById('mp3Url');
    const mp3Url = mp3El ? mp3El.dataset.url : '';
    if (mp3Url) {
      document.getElementById('playerStatus').textContent = 'Loading audio...';
      document.getElementById('loadingSpinner').style.display = 'block';
      document.getElementById('playIcon').textContent = '...';
      try {
        const res = await fetch(mp3Url);
        const arrayBuffer = await res.arrayBuffer();
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        document.getElementById('loadingSpinner').style.display = 'none';
        playAudioBuffer(0);
      } catch(e) {
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('playerStatus').textContent = 'Audio unavailable';
        document.getElementById('playIcon').textContent = '▶';
      }
    } else {
      const text = document.getElementById('articleBody')?.innerText || '';
      if (!text) { document.getElementById('playerStatus').textContent = 'Audio unavailable'; return; }
      document.getElementById('playerStatus').textContent = 'Preparing audio...';
      document.getElementById('loadingSpinner').style.display = 'block';
      document.getElementById('playIcon').textContent = '...';
      try {
        const response = await fetch(TTS_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            input: { text },
            voice: { languageCode: 'en-US', name: TTS_VOICE },
            audioConfig: { audioEncoding: 'MP3', speakingRate: playbackRate, pitch: 0 }
          })
        });
        if (!response.ok) throw new Error();
        const data = await response.json();
        const audioData = atob(data.audioContent);
        const bytes = new Uint8Array(audioData.length);
        for (let i = 0; i < audioData.length; i++) bytes[i] = audioData.charCodeAt(i);
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        audioBuffer = await audioContext.decodeAudioData(bytes.buffer);
        document.getElementById('loadingSpinner').style.display = 'none';
        playAudioBuffer(0);
      } catch(e) {
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('playerStatus').textContent = 'Audio unavailable';
        document.getElementById('playIcon').textContent = '▶';
      }
    }
  } else if (isPlaying) {
    pauseOffset = audioContext.currentTime - startTime;
    audioSource.stop(); audioSource = null;
    isPlaying = false; isPaused = true;
    clearInterval(progressTimer);
    document.getElementById('playIcon').textContent = '▶';
    document.getElementById('playerStatus').textContent = 'Paused';
  } else if (isPaused) {
    playAudioBuffer(pauseOffset);
  } else {
    playAudioBuffer(0);
  }
}

function stopAudio() {
  if (audioSource) { try { audioSource.stop(); } catch(e) {} audioSource = null; }
  isPlaying = false; isPaused = false; pauseOffset = 0;
  audioBuffer = null;
  clearInterval(progressTimer);
}

function seekAudio(e) {
  if (!audioBuffer) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const offset = pct * audioBuffer.duration;
  if (isPlaying || isPaused) {
    if (audioSource) { try { audioSource.stop(); } catch(e) {} }
    isPlaying = false; isPaused = false;
    playAudioBuffer(offset);
  }
}

function setRate(r) {
  playbackRate = r;
  document.querySelectorAll('.speed-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === r + '×' || b.textContent === r.toFixed(1) + '×');
  });
  if (isPlaying && audioSource) audioSource.playbackRate.value = r;
}

// ── DISQUS ──
function loadDisqus(articleId, articleTitle) {
  if (window.DISQUS) {
    DISQUS.reset({ reload: true, config: function() {
      this.page.identifier = articleId;
      this.page.title = articleTitle;
    }});
    return;
  }
  window.disqus_config = function() {
    this.page.url = `https://velocitysolutions.build/news.html#${articleId}`;
    this.page.identifier = articleId;
    this.page.title = articleTitle;
  };
  const d = document, s = d.createElement('script');
  s.src = 'https://velocitysolutions.disqus.com/embed.js';
  s.setAttribute('data-timestamp', +new Date());
  (d.head || d.body).appendChild(s);
}

// ── DOWNLOAD ──
async function downloadArchive() {
  // Fetch and format articles
  let articlesText = '# Velocity Solutions - Daily News Archive\n\n';
  articles.forEach(a => {
    articlesText += `## ${a.title}\n`;
    articlesText += `Date: ${a.date}\n\n`;
    articlesText += a.body.replace(/\\n/g, '\n') + '\n\n---\n\n';
  });

  // Fetch and format insights
  let insightsText = '# Velocity Solutions - Weekly Insights Archive\n\n';
  if (insightsData) {
    insightsText += `Updated: ${insightsData.updated}\n\n`;
    (insightsData.categories || []).forEach(cat => {
      insightsText += `## ${cat.category}\n\n`;
      (cat.tools || []).forEach(tool => {
        insightsText += `### ${tool.name} - ${tool.company}\n`;
        insightsText += `${tool.description}\n`;
        insightsText += `Pricing: ${tool.pricing || 'Contact vendor'}\n`;
        insightsText += `Built for: ${tool.built_for || '-'}\n`;
        insightsText += `Results: ${tool.results || '-'}\n`;
        insightsText += `Integrations: ${tool.integrations || '-'}\n\n`;
      });
    });
    if (insightsData.market_context) {
      const ctx = insightsData.market_context;
      insightsText += `## Market Context\n\n`;
      if (ctx.owner_expectations) insightsText += `### What Owners & GCs Expect\n${ctx.owner_expectations}\n\n`;
      if (ctx.adoption_cost) insightsText += `### Adoption Cost\n${ctx.adoption_cost}\n\n`;
      if (ctx.roi) insightsText += `### ROI\n${ctx.roi}\n\n`;
    }
  } else {
    insightsText += 'No insights available yet. Check back after the first Monday.\n';
  }

  // Download articles
  const aBlob = new Blob([articlesText], { type: 'text/markdown' });
  const aLink = document.createElement('a');
  aLink.href = URL.createObjectURL(aBlob);
  aLink.download = 'velocity-daily-news.md';
  aLink.click();

  // Download insights after short delay
  setTimeout(() => {
    const iBlob = new Blob([insightsText], { type: 'text/markdown' });
    const iLink = document.createElement('a');
    iLink.href = URL.createObjectURL(iBlob);
    iLink.download = 'velocity-insights.md';
    iLink.click();
  }, 500);

  // Open NotebookLM
  setTimeout(() => {
    window.open('https://notebooklm.google.com', '_blank');
  }, 1000);
}
